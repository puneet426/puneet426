<svg width="1000" height="320" viewBox="0 0 1000 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&amp;display=swap');

      .mono { font-family: 'Fira Code', 'Cascadia Code', monospace; }

      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .cursor { animation: blink 1.1s step-end infinite; }

      @keyframes f1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
      @keyframes f2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-1.5px)} }
      @keyframes f3 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2.5px)} }
      .fl1 { animation: f1 7s ease-in-out infinite; }
      .fl2 { animation: f2 6s ease-in-out infinite 0.8s; }
      .fl3 { animation: f3 8s ease-in-out infinite 1.6s; }

      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
      .pulse { animation: pulse 2.5s ease-in-out infinite; }
    </style>

    <radialGradient id="glow" cx="25%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a1040" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="1"/>
    </radialGradient>

    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1e293b" stroke-width="0.3" opacity="0.4"/>
    </pattern>

    <filter id="ws" x="-3%" y="-3%" width="106%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <filter id="glf" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="g-purple" x1="0" x2="1"><stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
    <linearGradient id="g-cyan"   x1="0" x2="1"><stop offset="0%" stop-color="#67e8f9"/><stop offset="100%" stop-color="#22d3ee"/></linearGradient>
    <linearGradient id="g-amber"  x1="0" x2="1"><stop offset="0%" stop-color="#fde68a"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
    <linearGradient id="g-rose"   x1="0" x2="1"><stop offset="0%" stop-color="#fda4af"/><stop offset="100%" stop-color="#fb7185"/></linearGradient>
    <linearGradient id="g-green"  x1="0" x2="1"><stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#22c55e"/></linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="320" fill="#030712" rx="12"/>
  <rect width="1000" height="320" fill="url(#glow)" rx="12"/>
  <rect width="1000" height="320" fill="url(#grid)" rx="12"/>
  <rect x="0" y="0" width="1000" height="1.5" rx="12" fill="#4ade80" opacity="0.15"/>


  <!-- ══════════════════════════════════════════════ -->
  <!--   WINDOW 1 — Profile Terminal (Left)          -->
  <!-- ══════════════════════════════════════════════ -->
  <g transform="translate(14, 12)">
    <g class="fl1" filter="url(#ws)">
      <rect width="540" height="296" rx="10" fill="#0c1221" stroke="#1e293b" stroke-width="1"/>
      <rect width="540" height="28" rx="10" fill="#080e1a"/>
      <rect y="20" width="540" height="8" fill="#080e1a"/>
      <circle cx="18" cy="14" r="5" fill="#ff5f57"/>
      <circle cx="34" cy="14" r="5" fill="#febc2e"/>
      <circle cx="50" cy="14" r="5" fill="#28c840"/>
      <text x="270" y="18" fill="#475569" font-size="10.5" class="mono" text-anchor="middle">puneet426: ~/.profile</text>
      <line x1="0" y1="28" x2="540" y2="28" stroke="#1e293b" stroke-width="0.5"/>

      <g transform="translate(16, 46)" class="mono" font-size="13">
        <!-- Prompt -->
        <text x="0" y="0">
          <tspan fill="#6366f1">❯</tspan>
          <tspan fill="#94a3b8"> cat </tspan>
          <tspan fill="#e2e8f0">identity.json</tspan>
        </text>

        <!-- JSON -->
        <g transform="translate(0, 26)" font-size="12.5">
          <text x="0" y="0" fill="#64748b">{</text>
          <text x="16" y="24">
            <tspan fill="#f472b6">"name"</tspan>
            <tspan fill="#64748b">    : </tspan>
            <tspan fill="#4ade80">"Puneet Tiwari"</tspan>
            <tspan fill="#64748b">,</tspan>
          </text>
          <text x="16" y="48">
            <tspan fill="#f472b6">"title"</tspan>
            <tspan fill="#64748b">   : </tspan>
            <tspan fill="#4ade80">"Full-Stack Dev &amp; "</tspan>
            <tspan fill="#64748b">,</tspan>
          </text>
          <text x="16" y="72">
            <tspan fill="#f472b6">"focus"</tspan>
            <tspan fill="#64748b">   : </tspan>
            <tspan fill="#4ade80">"Building Cool Stuff"</tspan>
            <tspan fill="#64748b">,</tspan>
          </text>
          <text x="16" y="96">
            <tspan fill="#f472b6">"powers"</tspan>
            <tspan fill="#64748b">  : [</tspan>
            <tspan fill="#fbbf24">"Coffee"</tspan>
            <tspan fill="#64748b">, </tspan>
            <tspan fill="#fbbf24">"Debugging"</tspan>
            <tspan fill="#64748b">, </tspan>
            <tspan fill="#fbbf24">"Crying"</tspan>
            <tspan fill="#64748b">],</tspan>
          </text>
          <text x="16" y="120">
            <tspan fill="#f472b6">"mood"</tspan>
            <tspan fill="#64748b">    : </tspan>
            <tspan fill="#fb7185">"it works... but why?"</tspan>
          </text>
          <text x="0" y="144" fill="#64748b">}</text>
        </g>

        <!-- Status bar -->
        <line x1="-16" y1="188" x2="524" y2="188" stroke="#1e293b" stroke-width="0.5"/>
        <text x="0" y="204" font-size="11">
          <tspan fill="#22c55e" class="pulse">●</tspan>
          <tspan fill="#475569"> online</tspan>
          <tspan fill="#1e293b">  |  </tspan>
          <tspan fill="#a855f7">⎇</tspan>
          <tspan fill="#475569"> main</tspan>
          <tspan fill="#1e293b">  |  </tspan>
          <tspan fill="#475569">✓ all systems nominal</tspan>
        </text>

        <!-- Next prompt -->
        <text x="0" y="228">
          <tspan fill="#6366f1">❯</tspan>
          <tspan fill="#94a3b8"> </tspan>
          <tspan fill="#e2e8f0" class="cursor">█</tspan>
        </text>
      </g>
    </g>
  </g>


  <!-- ══════════════════════════════════════════════ -->
  <!--   WINDOW 2 — Metrics (Top Right)              -->
  <!-- ══════════════════════════════════════════════ -->
  <g transform="translate(570, 12)">
    <g class="fl2" filter="url(#ws)">
      <rect width="416" height="140" rx="10" fill="#0c1221" stroke="#1e293b" stroke-width="1"/>
      <rect width="416" height="28" rx="10" fill="#080e1a"/>
      <rect y="20" width="416" height="8" fill="#080e1a"/>
      <circle cx="18" cy="14" r="3.5" fill="#475569"/>
      <circle cx="30" cy="14" r="3.5" fill="#475569"/>
      <text x="208" y="18" fill="#475569" font-size="10.5" class="mono" text-anchor="middle">htop — system monitor</text>
      <line x1="0" y1="28" x2="416" y2="28" stroke="#1e293b" stroke-width="0.5"/>

      <g transform="translate(14, 48)" class="mono" font-size="11">
        <!-- Bar tracks -->
        <rect x="52" y="-9"  width="256" height="10" rx="2" fill="#111827"/>
        <rect x="52" y="13"  width="256" height="10" rx="2" fill="#111827"/>
        <rect x="52" y="35"  width="256" height="10" rx="2" fill="#111827"/>
        <rect x="52" y="57"  width="256" height="10" rx="2" fill="#111827"/>

        <!-- VIEWS -->
        <text x="0" y="0"  fill="#64748b" font-size="10">VIEWS</text>
        <rect x="52" y="-9" width="190" height="10" rx="2" fill="url(#g-purple)"/>
        <text x="316" y="0"  fill="#c084fc" font-size="10" font-weight="600">4000</text>

        <!-- FOLLS -->
        <text x="0" y="22" fill="#64748b" font-size="10">FOLLS</text>
        <rect x="52" y="13" width="32"  height="10" rx="2" fill="url(#g-cyan)"/>
        <text x="316" y="22" fill="#67e8f9" font-size="10" font-weight="600">50</text>

        <!-- STARS -->
        <text x="0" y="44" fill="#64748b" font-size="10">STARS</text>
        <rect x="52" y="35" width="6"   height="10" rx="2" fill="url(#g-amber)"/>
        <text x="316" y="44" fill="#fde68a" font-size="10" font-weight="600">105</text>

        <!-- COFFE -->
        <text x="0" y="66" fill="#64748b" font-size="10">COFFE</text>
        <rect x="52" y="57" width="254" height="10" rx="2" fill="url(#g-rose)"/>
        <text x="316" y="66" fill="#fda4af" font-size="10" font-weight="600">∞</text>
      </g>
    </g>
  </g>


  <!-- ══════════════════════════════════════════════ -->
  <!--   WINDOW 3 — hello_world.sh (Bottom Right)    -->
  <!-- ══════════════════════════════════════════════ -->
  <g transform="translate(570, 164)">
    <g class="fl3" filter="url(#ws)">
      <rect width="416" height="144" rx="10" fill="#0c1221" stroke="#1e293b" stroke-width="1"/>
      <rect width="416" height="28" rx="10" fill="#080e1a"/>
      <rect y="20" width="416" height="8" fill="#080e1a"/>
      <circle cx="18" cy="14" r="3.5" fill="#475569"/>
      <circle cx="30" cy="14" r="3.5" fill="#475569"/>
      <text x="208" y="18" fill="#475569" font-size="10.5" class="mono" text-anchor="middle">./hello_world.sh</text>
      <line x1="0" y1="28" x2="416" y2="28" stroke="#1e293b" stroke-width="0.5"/>

      <!-- Prompt line -->
      <text x="14" y="46" class="mono" font-size="10.5">
        <tspan fill="#6366f1">❯</tspan>
        <tspan fill="#94a3b8"> bash </tspan>
        <tspan fill="#e2e8f0">hello_world.sh</tspan>
      </text>

      <!-- Big pixel-art "Hello!" + Cat scene -->
      <g transform="translate(14, 52)" filter="url(#glf)">

        <!-- ===== "Hello!" in pixel blocks ===== -->
        <g transform="translate(0, 4)">
          <!-- H -->
          <rect x="0"  y="0"  width="6" height="28" rx="1" fill="#4ade80"/>
          <rect x="20" y="0"  width="6" height="28" rx="1" fill="#4ade80"/>
          <rect x="6"  y="10" width="14" height="6"  rx="1" fill="#4ade80"/>

          <!-- e -->
          <rect x="34" y="4"  width="6"  height="24" rx="1" fill="#4ade80"/>
          <rect x="40" y="4"  width="14" height="5"  rx="1" fill="#4ade80"/>
          <rect x="40" y="13" width="12" height="5"  rx="1" fill="#4ade80"/>
          <rect x="40" y="23" width="14" height="5"  rx="1" fill="#4ade80"/>

          <!-- l -->
          <rect x="62" y="0" width="6" height="28" rx="1" fill="#4ade80"/>

          <!-- l -->
          <rect x="76" y="0" width="6" height="28" rx="1" fill="#4ade80"/>

          <!-- o -->
          <rect x="90"  y="4"  width="6"  height="24" rx="1" fill="#4ade80"/>
          <rect x="110" y="4"  width="6"  height="24" rx="1" fill="#4ade80"/>
          <rect x="96"  y="4"  width="14" height="5"  rx="1" fill="#4ade80"/>
          <rect x="96"  y="23" width="14" height="5"  rx="1" fill="#4ade80"/>

          <!-- ! -->
          <rect x="126" y="0"  width="7" height="17" rx="1.5" fill="#fbbf24"/>
          <rect x="126" y="22" width="7" height="7"  rx="2"   fill="#fbbf24"/>
        </g>

        <!-- ===== Cat sitting to the right ===== -->
        <g transform="translate(160, 0)">
          <!-- Cat body using SVG shapes for clean rendering -->
          <!-- Ears -->
          <polygon points="60,25 68,8 76,25" fill="#c4b5fd"/>
          <polygon points="96,25 104,8 112,25" fill="#c4b5fd"/>
          <polygon points="64,23 68,12 72,23" fill="#1e1b4b"/>
          <polygon points="100,23 104,12 108,23" fill="#1e1b4b"/>
          <!-- Head -->
          <ellipse cx="86" cy="35" rx="26" ry="18" fill="#c4b5fd"/>
          <!-- Eyes -->
          <ellipse cx="78" cy="32" rx="4" ry="4.5" fill="#1e1b4b"/>
          <ellipse cx="94" cy="32" rx="4" ry="4.5" fill="#1e1b4b"/>
          <ellipse cx="79" cy="31" rx="1.5" ry="1.5" fill="#e2e8f0"/>
          <ellipse cx="95" cy="31" rx="1.5" ry="1.5" fill="#e2e8f0"/>
          <!-- Nose -->
          <polygon points="84,37 88,37 86,40" fill="#fda4af"/>
          <!-- Mouth -->
          <path d="M 83 40 Q 86 44 86 40" fill="none" stroke="#1e1b4b" stroke-width="1"/>
          <path d="M 89 40 Q 86 44 86 40" fill="none" stroke="#1e1b4b" stroke-width="1"/>
          <!-- Whiskers -->
          <line x1="58" y1="36" x2="74" y2="38" stroke="#94a3b8" stroke-width="0.6"/>
          <line x1="56" y1="40" x2="74" y2="40" stroke="#94a3b8" stroke-width="0.6"/>
          <line x1="98" y1="38" x2="114" y2="36" stroke="#94a3b8" stroke-width="0.6"/>
          <line x1="98" y1="40" x2="116" y2="40" stroke="#94a3b8" stroke-width="0.6"/>
          <!-- Body -->
          <ellipse cx="86" cy="60" rx="22" ry="16" fill="#c4b5fd"/>
          <!-- Paws -->
          <ellipse cx="72" cy="72" rx="8" ry="5" fill="#ddd6fe"/>
          <ellipse cx="100" cy="72" rx="8" ry="5" fill="#ddd6fe"/>
          <!-- Tail -->
          <path d="M 108 58 Q 130 45 125 65" fill="none" stroke="#c4b5fd" stroke-width="5" stroke-linecap="round"/>

          <!-- Zzz -->
          <text x="120" y="15" class="mono" font-size="9" fill="#94a3b8">z</text>
          <text x="128" y="8"  class="mono" font-size="11" fill="#94a3b8">Z</text>
          <text x="138" y="0"  class="mono" font-size="13" fill="#94a3b8" font-weight="600">Z</text>
        </g>

        <!-- Ground line -->
        <line x1="0" y1="78" x2="390" y2="78" stroke="#1e293b" stroke-width="0.5"/>

        <!-- Subtitle -->
        <text x="0" y="90" class="mono" font-size="9" fill="#475569">~ have a nice day, stranger ~</text>

        <!-- Little mouse on the ground -->
        <text x="300" y="90" class="mono" font-size="9" fill="#64748b" xml:space="preserve">~(=^.^)</text>
      </g>
    </g>
  </g>

</svg>
